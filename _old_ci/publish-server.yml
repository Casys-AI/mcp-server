name: Publish

on:
  push:
    branches:
      - main

jobs:
  publish-jsr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - name: Publish to JSR
        run: npx jsr publish

  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build Node.js distribution
        run: bash scripts/build-node.sh

      - name: Install and publish to npm
        run: |
          cd dist-node
          npm install
          npm publish --access public || echo "Version already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
