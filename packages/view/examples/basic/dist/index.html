<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>view-basic — @casys/mcp-view demo</title>
    <style>
      :root {
  color-scheme: light dark;
  --bg: #ffffff;
  --fg: #111827;
  --muted: #6b7280;
  --border: #e5e7eb;
  --accent: #2563eb;
  --accent-fg: #ffffff;
  --paid: #059669;
  --pending: #d97706;
  --overdue: #dc2626;
  --row-hover: #f3f4f6;
  --banner-info-bg: #eff6ff;
  --banner-info-fg: #1e3a8a;
  --banner-warn-bg: #fef3c7;
  --banner-warn-fg: #78350f;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0b0f17;
    --fg: #e5e7eb;
    --muted: #9ca3af;
    --border: #1f2937;
    --row-hover: #111827;
    --banner-info-bg: #1e293b;
    --banner-info-fg: #93c5fd;
    --banner-warn-bg: #3b2e10;
    --banner-warn-fg: #fcd34d;
  }
}

* { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  background: var(--bg); color: var(--fg);
  font: 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
}

main {
  max-width: 860px;
  margin: 0 auto;
  padding: 20px;
}

.app-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 0 0 16px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 12px;
}
.app-header h1 {
  font-size: 20px;
  margin: 0;
  font-weight: 600;
}
.muted { color: var(--muted); font-size: 13px; margin: 0; }

.banner {
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 13px;
  margin-bottom: 16px;
}
.banner-info { background: var(--banner-info-bg); color: var(--banner-info-fg); }
.banner-warn { background: var(--banner-warn-bg); color: var(--banner-warn-fg); }

table.invoices {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
table.invoices th,
table.invoices td {
  text-align: left;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
}
table.invoices th {
  font-weight: 600;
  color: var(--muted);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
table.invoices td.amount,
table.invoices th.amount { text-align: right; font-variant-numeric: tabular-nums; }
table.invoices td.num { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
table.invoices td.date { color: var(--muted); font-variant-numeric: tabular-nums; }

.row { cursor: pointer; transition: background-color 0.1s; }
.row:hover,
.row:focus { background: var(--row-hover); outline: none; }
.row:focus { box-shadow: inset 2px 0 0 var(--accent); }

.status {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 500;
  text-transform: capitalize;
}
.status-paid { background: color-mix(in srgb, var(--paid) 15%, transparent); color: var(--paid); }
.status-pending { background: color-mix(in srgb, var(--pending) 15%, transparent); color: var(--pending); }
.status-overdue { background: color-mix(in srgb, var(--overdue) 15%, transparent); color: var(--overdue); }

.btn-back {
  border: 1px solid var(--border);
  background: transparent;
  color: var(--fg);
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  font: inherit;
}
.btn-back:hover { background: var(--row-hover); }
.btn-back:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

dl.detail {
  display: grid;
  grid-template-columns: max-content 1fr;
  gap: 8px 20px;
  margin: 16px 0;
}
dl.detail dt { color: var(--muted); font-weight: 500; }
dl.detail dd { margin: 0; }
dl.detail code {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 12px;
  background: var(--row-hover);
  padding: 1px 6px;
  border-radius: 4px;
}

pre.fatal {
  background: #fef2f2;
  color: #991b1b;
  padding: 12px;
  border-radius: 6px;
  white-space: pre-wrap;
}

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>view-basic — @casys/mcp-view demo</title>
    <style>
      :root {
  color-scheme: light dark;
  --bg: #ffffff;
  --fg: #111827;
  --muted: #6b7280;
  --border: #e5e7eb;
  --accent: #2563eb;
  --accent-fg: #ffffff;
  --paid: #059669;
  --pending: #d97706;
  --overdue: #dc2626;
  --row-hover: #f3f4f6;
  --banner-info-bg: #eff6ff;
  --banner-info-fg: #1e3a8a;
  --banner-warn-bg: #fef3c7;
  --banner-warn-fg: #78350f;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0b0f17;
    --fg: #e5e7eb;
    --muted: #9ca3af;
    --border: #1f2937;
    --row-hover: #111827;
    --banner-info-bg: #1e293b;
    --banner-info-fg: #93c5fd;
    --banner-warn-bg: #3b2e10;
    --banner-warn-fg: #fcd34d;
  }
}

* { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  background: var(--bg); color: var(--fg);
  font: 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
}

main {
  max-width: 860px;
  margin: 0 auto;
  padding: 20px;
}

.app-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 0 0 16px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 12px;
}
.app-header h1 {
  font-size: 20px;
  margin: 0;
  font-weight: 600;
}
.muted { color: var(--muted); font-size: 13px; margin: 0; }

.banner {
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 13px;
  margin-bottom: 16px;
}
.banner-info { background: var(--banner-info-bg); color: var(--banner-info-fg); }
.banner-warn { background: var(--banner-warn-bg); color: var(--banner-warn-fg); }

table.invoices {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
table.invoices th,
table.invoices td {
  text-align: left;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
}
table.invoices th {
  font-weight: 600;
  color: var(--muted);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
table.invoices td.amount,
table.invoices th.amount { text-align: right; font-variant-numeric: tabular-nums; }
table.invoices td.num { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
table.invoices td.date { color: var(--muted); font-variant-numeric: tabular-nums; }

.row { cursor: pointer; transition: background-color 0.1s; }
.row:hover,
.row:focus { background: var(--row-hover); outline: none; }
.row:focus { box-shadow: inset 2px 0 0 var(--accent); }

    <style>
      :root {
  color-scheme: light dark;
  --bg: #ffffff;
  --fg: #111827;
  --muted: #6b7280;
  --border: #e5e7eb;
  --accent: #2563eb;
  --accent-fg: #ffffff;
  --paid: #059669;
  --pending: #d97706;
  --overdue: #dc2626;
  --row-hover: #f3f4f6;
  --banner-info-bg: #eff6ff;
  --banner-info-fg: #1e3a8a;
  --banner-warn-bg: #fef3c7;
  --banner-warn-fg: #78350f;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0b0f17;
    --fg: #e5e7eb;
    --muted: #9ca3af;
    --border: #1f2937;
    --row-hover: #111827;
    --banner-info-bg: #1e293b;
    --banner-info-fg: #93c5fd;
    --banner-warn-bg: #3b2e10;
    --banner-warn-fg: #fcd34d;
  }
}

* { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  background: var(--bg); color: var(--fg);
  font: 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
}

main {
  max-width: 860px;
  margin: 0 auto;
  padding: 20px;
}

.app-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 0 0 16px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 12px;
}
.app-header h1 {
  font-size: 20px;
  margin: 0;
  font-weight: 600;
}
.muted { color: var(--muted); font-size: 13px; margin: 0; }

.banner {
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 13px;
  margin-bottom: 16px;
}
.banner-info { background: var(--banner-info-bg); color: var(--banner-info-fg); }
.banner-warn { background: var(--banner-warn-bg); color: var(--banner-warn-fg); }

table.invoices {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
table.invoices th,
table.invoices td {
  text-align: left;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
}
table.invoices th {
  font-weight: 600;
  color: var(--muted);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
table.invoices td.amount,
table.invoices th.amount { text-align: right; font-variant-numeric: tabular-nums; }
table.invoices td.num { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
table.invoices td.date { color: var(--muted); font-variant-numeric: tabular-nums; }

.row { cursor: pointer; transition: background-color 0.1s; }
.row:hover,
.row:focus { background: var(--row-hover); outline: none; }
.row:focus { box-shadow: inset 2px 0 0 var(--accent); }

.status {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 500;
  text-transform: capitalize;
}
.status-paid { background: color-mix(in srgb, var(--paid) 15%, transparent); color: var(--paid); }
.status-pending { background: color-mix(in srgb, var(--pending) 15%, transparent); color: var(--pending); }
.status-overdue { background: color-mix(in srgb, var(--overdue) 15%, transparent); color: var(--overdue); }

.btn-back {
  border: 1px solid var(--border);
  background: transparent;
  color: var(--fg);
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  font: inherit;
}
.btn-back:hover { background: var(--row-hover); }
.btn-back:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

dl.detail {
  display: grid;
  grid-template-columns: max-content 1fr;
  gap: 8px 20px;
  margin: 16px 0;
}
dl.detail dt { color: var(--muted); font-weight: 500; }
dl.detail dd { margin: 0; }
dl.detail code {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 12px;
  background: var(--row-hover);
  padding: 1px 6px;
  border-radius: 4px;
}

pre.fatal {
  background: #fef2f2;
  color: #991b1b;
  padding: 12px;
  border-radius: 6px;
  white-space: pre-wrap;
}

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>view-basic — @casys/mcp-view demo</title>
    <style>
      :root {
  color-scheme: light dark;
  --bg: #ffffff;
  --fg: #111827;
  --muted: #6b7280;
  --border: #e5e7eb;
  --accent: #2563eb;
  --accent-fg: #ffffff;
  --paid: #059669;
  --pending: #d97706;
  --overdue: #dc2626;
  --row-hover: #f3f4f6;
  --banner-info-bg: #eff6ff;
  --banner-info-fg: #1e3a8a;
  --banner-warn-bg: #fef3c7;
  --banner-warn-fg: #78350f;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0b0f17;
    --fg: #e5e7eb;
    --muted: #9ca3af;
    --border: #1f2937;
    --row-hover: #111827;
    --banner-info-bg: #1e293b;
    --banner-info-fg: #93c5fd;
    --banner-warn-bg: #3b2e10;
    --banner-warn-fg: #fcd34d;
  }
}

* { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  background: var(--bg); color: var(--fg);
  font: 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
}

main {
  max-width: 860px;
  margin: 0 auto;
  padding: 20px;
}

.app-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 0 0 16px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 12px;
}
.app-header h1 {
  font-size: 20px;
  margin: 0;
  font-weight: 600;
}
.muted { color: var(--muted); font-size: 13px; margin: 0; }

.banner {
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 13px;
  margin-bottom: 16px;
}
.banner-info { background: var(--banner-info-bg); color: var(--banner-info-fg); }
.banner-warn { background: var(--banner-warn-bg); color: var(--banner-warn-fg); }

table.invoices {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
table.invoices th,
table.invoices td {
  text-align: left;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
}
table.invoices th {
  font-weight: 600;
  color: var(--muted);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
table.invoices td.amount,
table.invoices th.amount { text-align: right; font-variant-numeric: tabular-nums; }
table.invoices td.num { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
table.invoices td.date { color: var(--muted); font-variant-numeric: tabular-nums; }

.row { cursor: pointer; transition: background-color 0.1s; }
.row:hover,
.row:focus { background: var(--row-hover); outline: none; }
.row:focus { box-shadow: inset 2px 0 0 var(--accent); }

.status {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 500;
  text-transform: capitalize;
}
.status-paid { background: color-mix(in srgb, var(--paid) 15%, transparent); color: var(--paid); }
.status-pending { background: color-mix(in srgb, var(--pending) 15%, transparent); color: var(--pending); }
.status-overdue { background: color-mix(in srgb, var(--overdue) 15%, transparent); color: var(--overdue); }

.btn-back {
  border: 1px solid var(--border);
  background: transparent;
  color: var(--fg);
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  font: inherit;
}
.btn-back:hover { background: var(--row-hover); }
.btn-back:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

dl.detail {
  display: grid;
  grid-template-columns: max-content 1fr;
  gap: 8px 20px;
  margin: 16px 0;
}
dl.detail dt { color: var(--muted); font-weight: 500; }
dl.detail dd { margin: 0; }
dl.detail code {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 12px;
  background: var(--row-hover);
  padding: 1px 6px;
  border-radius: 4px;
}

pre.fatal {
  background: #fef2f2;
  color: #991b1b;
  padding: 12px;
  border-radius: 6px;
  white-space: pre-wrap;
}

    </style>
  </head>
  <body>

      :root {
  color-scheme: light dark;
  --bg: #ffffff;
  --fg: #111827;
  --muted: #6b7280;
  --border: #e5e7eb;
  --accent: #2563eb;
  --accent-fg: #ffffff;
  --paid: #059669;
  --pending: #d97706;
  --overdue: #dc2626;
  --row-hover: #f3f4f6;
  --banner-info-bg: #eff6ff;
  --banner-info-fg: #1e3a8a;
  --banner-warn-bg: #fef3c7;
  --banner-warn-fg: #78350f;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0b0f17;
    --fg: #e5e7eb;
    --muted: #9ca3af;
    --border: #1f2937;
    --row-hover: #111827;
    --banner-info-bg: #1e293b;
    --banner-info-fg: #93c5fd;
    --banner-warn-bg: #3b2e10;
    --banner-warn-fg: #fcd34d;
  }
}

* { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  background: var(--bg); color: var(--fg);
  font: 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
}

main {
  max-width: 860px;
  margin: 0 auto;
  padding: 20px;
}

.app-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 0 0 16px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 12px;
}
.app-header h1 {
  font-size: 20px;
  margin: 0;
  font-weight: 600;
}
.muted { color: var(--muted); font-size: 13px; margin: 0; }

.banner {
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 13px;
  margin-bottom: 16px;
}
.banner-info { background: var(--banner-info-bg); color: var(--banner-info-fg); }
.banner-warn { background: var(--banner-warn-bg); color: var(--banner-warn-fg); }

table.invoices {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
table.invoices th,
table.invoices td {
  text-align: left;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
}
table.invoices th {
  font-weight: 600;
  color: var(--muted);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
table.invoices td.amount,
table.invoices th.amount { text-align: right; font-variant-numeric: tabular-nums; }
table.invoices td.num { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
table.invoices td.date { color: var(--muted); font-variant-numeric: tabular-nums; }

.row { cursor: pointer; transition: background-color 0.1s; }
.row:hover,
.row:focus { background: var(--row-hover); outline: none; }
.row:focus { box-shadow: inset 2px 0 0 var(--accent); }

.status {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 500;
  text-transform: capitalize;
}
.status-paid { background: color-mix(in srgb, var(--paid) 15%, transparent); color: var(--paid); }
.status-pending { background: color-mix(in srgb, var(--pending) 15%, transparent); color: var(--pending); }
.status-overdue { background: color-mix(in srgb, var(--overdue) 15%, transparent); color: var(--overdue); }

.btn-back {
  border: 1px solid var(--border);
  background: transparent;
  color: var(--fg);
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  font: inherit;
}
.btn-back:hover { background: var(--row-hover); }
.btn-back:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

dl.detail {
  display: grid;
  grid-template-columns: max-content 1fr;
  gap: 8px 20px;
  margin: 16px 0;
}
dl.detail dt { color: var(--muted); font-weight: 500; }
dl.detail dd { margin: 0; }
dl.detail code {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 12px;
  background: var(--row-hover);
  padding: 1px 6px;
  border-radius: 4px;
}

pre.fatal {
  background: #fef2f2;
  color: #991b1b;
  padding: 12px;
  border-radius: 6px;
  white-space: pre-wrap;
}

      :root {
  color-scheme: light dark;
  --bg: #ffffff;
  --fg: #111827;
  --muted: #6b7280;
  --border: #e5e7eb;
  --accent: #2563eb;
  --accent-fg: #ffffff;
  --paid: #059669;
  --pending: #d97706;
  --overdue: #dc2626;
  --row-hover: #f3f4f6;
  --banner-info-bg: #eff6ff;
  --banner-info-fg: #1e3a8a;
  --banner-warn-bg: #fef3c7;
  --banner-warn-fg: #78350f;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0b0f17;
    --fg: #e5e7eb;
    --muted: #9ca3af;
    --border: #1f2937;
    --row-hover: #111827;
    --banner-info-bg: #1e293b;
    --banner-info-fg: #93c5fd;
    --banner-warn-bg: #3b2e10;
    --banner-warn-fg: #fcd34d;
  }
}

* { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  background: var(--bg); color: var(--fg);
  font: 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
}

main {
  max-width: 860px;
  margin: 0 auto;
  padding: 20px;
}

.app-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 0 0 16px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 12px;
}
.app-header h1 {
  font-size: 20px;
  margin: 0;
  font-weight: 600;
}
.muted { color: var(--muted); font-size: 13px; margin: 0; }

.banner {
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 13px;
  margin-bottom: 16px;
}
.banner-info { background: var(--banner-info-bg); color: var(--banner-info-fg); }
.banner-warn { background: var(--banner-warn-bg); color: var(--banner-warn-fg); }

table.invoices {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
table.invoices th,
table.invoices td {
  text-align: left;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
}
table.invoices th {
  font-weight: 600;
  color: var(--muted);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
table.invoices td.amount,
table.invoices th.amount { text-align: right; font-variant-numeric: tabular-nums; }
table.invoices td.num { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
table.invoices td.date { color: var(--muted); font-variant-numeric: tabular-nums; }

.row { cursor: pointer; transition: background-color 0.1s; }
.row:hover,
.row:focus { background: var(--row-hover); outline: none; }
.row:focus { box-shadow: inset 2px 0 0 var(--accent); }

.status {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 500;
  text-transform: capitalize;
}
.status-paid { background: color-mix(in srgb, var(--paid) 15%, transparent); color: var(--paid); }
.status-pending { background: color-mix(in srgb, var(--pending) 15%, transparent); color: var(--pending); }
.status-overdue { background: color-mix(in srgb, var(--overdue) 15%, transparent); color: var(--overdue); }

.btn-back {
  border: 1px solid var(--border);
  background: transparent;
  color: var(--fg);
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  font: inherit;
}
.btn-back:hover { background: var(--row-hover); }
.btn-back:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

dl.detail {
  display: grid;
  grid-template-columns: max-content 1fr;
  gap: 8px 20px;
  margin: 16px 0;
}
dl.detail dt { color: var(--muted); font-weight: 500; }
dl.detail dd { margin: 0; }
dl.detail code {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 12px;
  background: var(--row-hover);
  padding: 1px 6px;
  border-radius: 4px;
}

pre.fatal {
  background: #fef2f2;
  color: #991b1b;
  padding: 12px;
  border-radius: 6px;
  white-space: pre-wrap;
}

.muted { color: var(--muted); font-size: 13px; margin: 0; }

.banner {
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 13px;
  margin-bottom: 16px;
}
.banner-info { background: var(--banner-info-bg); color: var(--banner-info-fg); }
.banner-warn { background: var(--banner-warn-bg); color: var(--banner-warn-fg); }

table.invoices {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
table.invoices th,
table.invoices td {
  text-align: left;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
}
table.invoices th {
  font-weight: 600;
  color: var(--muted);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
table.invoices td.amount,
table.invoices th.amount { text-align: right; font-variant-numeric: tabular-nums; }
table.invoices td.num { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
table.invoices td.date { color: var(--muted); font-variant-numeric: tabular-nums; }

.row { cursor: pointer; transition: background-color 0.1s; }
.row:hover,
.row:focus { background: var(--row-hover); outline: none; }
.row:focus { box-shadow: inset 2px 0 0 var(--accent); }

.status {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 500;
  text-transform: capitalize;
}
.status-paid { background: color-mix(in srgb, var(--paid) 15%, transparent); color: var(--paid); }
.status-pending { background: color-mix(in srgb, var(--pending) 15%, transparent); color: var(--pending); }
.status-overdue { background: color-mix(in srgb, var(--overdue) 15%, transparent); color: var(--overdue); }

.btn-back {
  border: 1px solid var(--border);
  background: transparent;
  color: var(--fg);
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  font: inherit;
}
.btn-back:hover { background: var(--row-hover); }
.btn-back:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

dl.detail {
  display: grid;
  grid-template-columns: max-content 1fr;
  gap: 8px 20px;
  margin: 16px 0;
}
dl.detail dt { color: var(--muted); font-weight: 500; }
dl.detail dd { margin: 0; }
dl.detail code {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 12px;
  background: var(--row-hover);
  padding: 1px 6px;
  border-radius: 4px;
}

pre.fatal {
  background: #fef2f2;
  color: #991b1b;
  padding: 12px;
  border-radius: 6px;
  white-space: pre-wrap;
}
